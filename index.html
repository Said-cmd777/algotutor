<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AlgoTutor — USTHB L1 Mathematics</title>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    :root {
      --bg: #0d1117;
      --bg2: #161b22;
      --bg3: #1c2128;
      --surface: #21262d;
      --border: #30363d;
      --text: #e6edf3;
      --text2: #8b949e;
      --accent: #58a6ff;
      --accent-dim: rgba(88, 166, 255, 0.12);
      --green: #3fb950;
      --green-dim: rgba(63, 185, 80, 0.12);
      --red: #f85149;
      --red-dim: rgba(248, 81, 73, 0.12);
      --yellow: #d29922;
      --yellow-dim: rgba(210, 153, 34, 0.12);
      --purple: #bc8cff;
      --mono: 'Cascadia Code', 'Fira Code', 'Consolas', 'Courier New', monospace;
    }

    html,
    body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
      font-size: 16px;
      line-height: 1.7
    }

    a {
      color: var(--accent);
      text-decoration: none
    }

    #app {
      display: flex;
      flex-direction: column;
      min-height: 100vh
    }

    header {
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      position: sticky;
      top: 0;
      z-index: 50
    }

    .logo {
      font-size: 18px;
      font-weight: 700;
      white-space: nowrap
    }

    .logo span {
      color: var(--accent)
    }

    #progress-wrap {
      flex: 1;
      background: var(--surface);
      border-radius: 99px;
      height: 6px;
      overflow: hidden;
      min-width: 60px
    }

    #progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--accent), var(--purple));
      border-radius: 99px;
      transition: width .3s
    }

    #progress-pct {
      font-size: 12px;
      color: var(--text2);
      white-space: nowrap;
      font-variant-numeric: tabular-nums
    }

    .back-btn {
      background: var(--surface);
      color: var(--text2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 5px 12px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      display: none
    }

    .back-btn:hover {
      border-color: var(--accent);
      color: var(--accent)
    }

    main {
      flex: 1;
      max-width: 880px;
      width: 100%;
      margin: 0 auto;
      padding: 24px 16px 80px
    }

    .card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 22px;
      margin-bottom: 20px
    }

    .card-title {
      font-size: 17px;
      font-weight: 700;
      margin-bottom: 14px;
      color: var(--accent)
    }

    .section-head {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 18px;
      padding-bottom: 10px;
      border-bottom: 2px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px
    }

    .section-num {
      background: var(--accent);
      color: #000;
      border-radius: 50%;
      width: 28px;
      height: 28px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 700;
      flex-shrink: 0
    }

    .code {
      background: #0d1117;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px 16px;
      font-family: var(--mono);
      font-size: 13px;
      line-height: 1.65;
      overflow-x: auto;
      margin: 10px 0;
      white-space: pre;
      direction: ltr;
      text-align: left;
      unicode-bidi: isolate
    }

    .diagram {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px;
      font-family: var(--mono);
      font-size: 12.5px;
      line-height: 1.55;
      color: #79c0ff;
      overflow-x: auto;
      margin: 10px 0;
      white-space: pre;
      direction: ltr;
      text-align: left
    }

    .insight {
      background: var(--accent-dim);
      border-left: 3px solid var(--accent);
      padding: 10px 14px;
      border-radius: 0 8px 8px 0;
      margin-top: 14px;
      font-weight: 600;
      font-size: 14px
    }

    .real-world {
      background: var(--yellow-dim);
      border-left: 3px solid var(--yellow);
      padding: 10px 14px;
      border-radius: 0 8px 8px 0;
      margin: 10px 0;
      font-size: 14px
    }

    .tier-badge {
      display: inline-block;
      font-size: 11px;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 99px;
      margin-bottom: 12px;
      letter-spacing: .3px
    }

    .t1 {
      background: var(--green-dim);
      color: var(--green);
      border: 1px solid var(--green)
    }

    .t2 {
      background: var(--yellow-dim);
      color: var(--yellow);
      border: 1px solid var(--yellow)
    }

    .t3 {
      background: var(--red-dim);
      color: var(--red);
      border: 1px solid var(--red)
    }

    .trace-tbl {
      width: 100%;
      border-collapse: collapse;
      margin: 10px 0;
      font-size: 13px
    }

    .trace-tbl th {
      background: var(--surface);
      padding: 7px 10px;
      text-align: left;
      border: 1px solid var(--border);
      font-weight: 600;
      font-size: 12px
    }

    .trace-tbl td {
      padding: 7px 10px;
      border: 1px solid var(--border)
    }

    .trace-in {
      width: 80px;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: 4px 7px;
      color: var(--text);
      font-family: var(--mono);
      font-size: 13px;
      text-align: left
    }

    .trace-in.ok {
      border-color: var(--green);
      background: var(--green-dim)
    }

    .trace-in.err {
      border-color: var(--red);
      background: var(--red-dim)
    }

    .blank-in {
      background: var(--bg3);
      border: 1px solid var(--accent);
      border-radius: 5px;
      padding: 4px 8px;
      min-width: 160px;
      color: var(--text);
      font-family: var(--mono);
      font-size: 13px
    }

    .blank-in:focus {
      outline: none;
      box-shadow: 0 0 0 2px var(--accent-dim)
    }

    .blank-in.ok {
      border-color: var(--green);
      background: var(--green-dim)
    }

    .blank-in.err {
      border-color: var(--red);
      background: var(--red-dim)
    }

    textarea.answer {
      width: 100%;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      color: var(--text);
      font-family: var(--mono);
      font-size: 13px;
      line-height: 1.6;
      resize: vertical;
      min-height: 140px;
      direction: ltr
    }

    textarea.answer:focus {
      outline: none;
      border-color: var(--accent)
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border-radius: 7px;
      border: none;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      font-family: inherit
    }

    .btn:hover {
      opacity: .85
    }

    .btn-p {
      background: var(--accent);
      color: #000
    }

    .btn-g {
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border)
    }

    .btn-sol {
      background: var(--red-dim);
      color: var(--red);
      border: 1px solid var(--red);
      font-size: 12px;
      padding: 5px 12px;
      margin-top: 6px;
      display: none;
      cursor: pointer;
      border-radius: 5px
    }

    .btn-dl {
      background: var(--green-dim);
      color: var(--green);
      border: 1px solid var(--green);
      font-size: 12px;
      padding: 5px 12px;
      cursor: pointer;
      border-radius: 5px
    }

    .btn-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 10px
    }

    .reveal {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      margin-top: 10px;
      display: none
    }

    .reveal.show {
      display: block
    }

    .side {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 8px
    }

    @media(max-width:600px) {
      .side {
        grid-template-columns: 1fr
      }
    }

    .ck-list {
      list-style: none;
      margin-top: 8px
    }

    .ck-list li {
      padding: 6px 0;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: flex-start;
      gap: 8px;
      font-size: 13px
    }

    .ck-list li:last-child {
      border-bottom: none
    }

    .ck {
      width: 18px;
      height: 18px;
      border: 2px solid var(--border);
      border-radius: 4px;
      cursor: pointer;
      flex-shrink: 0;
      margin-top: 2px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px
    }

    .ck.on {
      background: var(--green);
      border-color: var(--green);
      color: #000
    }

    .ck.auto {
      background: var(--yellow);
      border-color: var(--yellow);
      color: #000
    }

    .ck.auto+span::after {
      content: ' (detected)';
      font-size: 10px;
      color: var(--yellow);
      font-weight: 400;
      font-style: italic
    }

    .hint-btn {
      background: var(--yellow-dim);
      color: var(--yellow);
      border: 1px solid var(--yellow);
      padding: 4px 12px;
      border-radius: 5px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      margin-right: 6px
    }

    .hint-box {
      background: var(--yellow-dim);
      border: 1px solid var(--yellow);
      border-radius: 7px;
      padding: 10px 14px;
      margin-top: 8px;
      font-size: 13px;
      display: none
    }

    .hint-box.show {
      display: block
    }

    .ch-card {
      background: var(--bg2);
      border: 2px solid var(--purple);
      border-radius: 10px;
      padding: 22px;
      margin-bottom: 20px
    }

    .ch-title {
      color: var(--purple);
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 10px
    }

    .ch-scene {
      font-size: 14px;
      line-height: 1.7;
      color: var(--text2);
      margin-bottom: 12px;
      padding: 10px;
      background: var(--bg3);
      border-radius: 7px
    }

    .topic-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 10px;
      margin-bottom: 24px
    }

    .topic-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 10px;
      cursor: pointer;
      text-align: center;
      transition: border-color .2s, background .2s
    }

    .topic-card:hover {
      border-color: var(--accent);
      background: var(--accent-dim)
    }

    .topic-card.sel {
      border-color: var(--accent);
      background: var(--accent-dim)
    }

    .topic-card.locked {
      cursor: not-allowed;
      opacity: .55;
      border-style: dashed
    }

    .topic-card.locked:hover {
      border-color: var(--border);
      background: var(--bg2)
    }

    .topic-icon {
      font-size: 24px;
      margin-bottom: 6px
    }

    .topic-name {
      font-size: 13px;
      font-weight: 600
    }

    .topic-sub {
      font-size: 11px;
      color: var(--text2);
      margin-top: 3px
    }

    .saved-badge {
      display: inline-block;
      font-size: 10px;
      background: var(--green-dim);
      color: var(--green);
      border: 1px solid var(--green);
      border-radius: 99px;
      padding: 1px 7px;
      margin-left: 6px;
      vertical-align: middle
    }

    #start-screen {
      text-align: center;
      padding: 36px 16px
    }

    #start-screen h1 {
      font-size: 24px;
      font-weight: 800;
      margin-bottom: 8px
    }

    #start-screen p {
      color: var(--text2);
      font-size: 14px;
      margin-bottom: 28px;
      max-width: 520px;
      margin-left: auto;
      margin-right: auto;
      line-height: 1.7
    }

    #tutor-area {
      display: none
    }

    .pills {
      display: flex;
      gap: 6px;
      margin-bottom: 20px;
      flex-wrap: wrap
    }

    .pill {
      padding: 6px 14px;
      border-radius: 99px;
      background: var(--surface);
      border: 1px solid var(--border);
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      color: var(--text2)
    }

    .pill.on {
      background: var(--accent-dim);
      border-color: var(--accent);
      color: var(--accent)
    }

    .desc {
      font-size: 14px;
      color: var(--text2);
      margin-bottom: 12px;
      line-height: 1.7
    }

    p {
      margin-bottom: 8px
    }

    .syntax-warn {
      background: var(--red-dim);
      border: 1px solid var(--red);
      border-radius: 7px;
      padding: 8px 12px;
      margin-top: 8px;
      font-size: 12px;
      color: var(--red);
      display: none
    }

    .syntax-warn.show {
      display: block
    }

    .hdr-btn {
      background: var(--surface);
      color: var(--text2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 4px 10px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      white-space: nowrap
    }

    .hdr-btn:hover {
      border-color: var(--accent);
      color: var(--accent)
    }

    /* ── Mobile Responsive ── */
    @media(max-width:640px) {
      header { padding: 8px 10px; gap: 8px; flex-wrap: wrap }
      .logo { font-size: 15px }
      .hdr-btn { font-size: 10px; padding: 3px 7px }
      .back-btn { font-size: 11px; padding: 4px 8px }
      #progress-pct { font-size: 10px }
      main { padding: 12px 8px 60px }
      #start-screen { padding: 20px 8px }
      #start-screen h1 { font-size: 18px }
      #start-screen p { font-size: 12px }
      .topic-grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 8px }
      .topic-card { padding: 10px 8px }
      .topic-icon { font-size: 20px }
      .topic-name { font-size: 12px }
      .topic-sub { font-size: 10px }
      .card { padding: 14px 12px; margin-bottom: 14px }
      .card-title { font-size: 15px }
      .section-head { font-size: 16px }
      .code { font-size: 11px; padding: 10px; line-height: 1.5 }
      .diagram { font-size: 10px; padding: 10px; line-height: 1.4 }
      .trace-tbl { display: block; overflow-x: auto; -webkit-overflow-scrolling: touch }
      .trace-tbl th, .trace-tbl td { padding: 5px 6px; font-size: 11px; white-space: nowrap }
      .trace-in { width: 60px; font-size: 11px; padding: 3px 5px }
      .blank-in { min-width: 100px; font-size: 11px }
      textarea.answer { font-size: 11px; min-height: 100px; padding: 8px }
      .btn { font-size: 11px; padding: 6px 12px }
      .btn-row { gap: 6px }
      .ch-card { padding: 14px 12px }
      .ch-title { font-size: 14px }
      .ch-scene { font-size: 12px; padding: 8px }
      .pills { gap: 4px }
      .pill { padding: 5px 10px; font-size: 11px }
      .real-world, .insight { font-size: 12px; padding: 8px 10px }
      .hint-btn { font-size: 10px; padding: 3px 8px }
      .ck-list li { font-size: 11px }
      .btn-sol { font-size: 10px }
      .btn-dl { font-size: 10px }
      .side { grid-template-columns: 1fr }
    }
  </style>
</head>

<body>
  <div id="app">
    <header>
      <div class="logo">Algo<span>Tutor</span></div>
      <button class="back-btn" id="backBtn" onclick="goHome()">← Topics</button>
      <button class="hdr-btn" onclick="exportProgress()" title="Save your progress to a file">💾 Export</button>
      <button class="hdr-btn" onclick="importProgress()" title="Restore progress from a file">📂 Import</button>
      <input type="file" id="importFile" accept=".json" style="display:none" onchange="doImport(event)">
      <div id="progress-wrap">
        <div id="progress-bar"></div>
      </div>
      <div id="progress-pct">0%</div>
    </header>
    <main>
      <div id="start-screen">
        <h1>📘 AlgoTutor — USTHB L1</h1>
        <p>Interactive study tool for the Algorithms & Data Structures II course (Serie 1 & Serie 2). Pick a topic,
          learn the concept, then test yourself. Progress is saved automatically.</p>
        <div class="topic-grid" id="topicGrid"></div>
      </div>
      <div id="tutor-area">
        <div class="pills" id="pills"></div>
        <div id="sec0"></div>
        <div id="sec1" style="display:none"></div>
        <div id="sec2" style="display:none"></div>
      </div>
    </main>
  </div>

  <script>

    const T = [


      {
        id: 'vars', icon: '📦', name: 'Variables & Types', sub: 'integer, float, boolean, char',
        concept: {
          title: 'Why do variables exist?',
          real: 'Think of a variable as a labeled box. You write "age" on it and store 21 inside. Types determine the box size.',
          body: `<p>A <strong>variable</strong> is a named memory cell. It has a <strong>name</strong>, <strong>type</strong>, and <strong>content</strong>.</p>
<p>A <strong>constant</strong> never changes. Keyword: <code>Const</code>.</p>
<p>Types: <code>integer</code>, <code>float</code>, <code>character</code>, <code>boolean</code>, <code>string</code>.</p>
<p>Assignment: <code>&lt;-</code> (never <code>=</code> — that is comparison only).</p>`,
          diagram: `  Name:  x        y        pi       ok
  Type:  integer  float    float    boolean
        ┌────┐   ┌─────┐  ┌──────┐ ┌───────┐
  Value:│ 42 │   │ 3.7 │  │ 3.14 │ │ true  │
        └────┘   └─────┘  └──────┘ └───────┘
         Var      Var      Const     Var`,
          code: `Algorithm Example;
Var x, y : integer;
    z    : float;
Const PI = 3.14;
Begin
  x <- 5;
  y <- x + 3;         // y = 8
  z <- (x + y) / 2;   // z = 6.5
  Write("Result: ", z);
End;`,
          insight: 'A variable is just a named box in memory — the type tells the computer how big the box needs to be.'
        },
        exercises: {
          t1: {
            title: 'Trace: Variable Swap', desc: 'Predict x after each line.',
            code: `x <- 5;\ny <- 9;\ntemp <- x;\nx <- y;\ny <- temp;`,
            steps: [{ label: 'After x <- 5: x =', ans: '5' }, { label: 'After temp <- x: temp =', ans: '5' }, { label: 'After x <- y: x =', ans: '9' }, { label: 'After y <- temp: y =', ans: '5' }]
          },
          t2: {
            title: 'Fill: Circle Area', desc: 'Complete to calculate area (Area = R² × Pi).',
            code: `Algorithm Circle_Area;\nConst Pi = 3.14;\nVar Radius : integer;\n    Area : float;\nBegin\n  Write("Enter radius: ");\n  _____;              // blank 1\n  Area <- _____;      // blank 2\n  Write("Area = ", Area);\nEnd;`,
            blanks: [{ ph: 'Read the radius', ans: 'Read(Radius)', hint: 'Use Read()' }, { ph: 'Area formula', ans: 'Radius * Radius * Pi', hint: 'R² × Pi' }]
          },
          t3: {
            title: 'Build: Swap without temp', scenario: 'Swap two integers without any extra variable.',
            desc: 'Write an algorithm: x=2, y=8, swap using only + and -.',
            ref: `Algorithm Swap_NoTemp;\nVar x, y : integer;\nBegin\n  x <- 2;\n  y <- 8;\n  x <- x + y;    // x = 10\n  y <- x - y;    // y = 2\n  x <- x - y;    // x = 8\n  Write("x=", x, " y=", y);\nEnd;`,
            checks: ['Declared x and y as integers?', 'Used only + and - (no temp)?', 'Final values are swapped?', 'Tested trace: x=10→y=2→x=8?']
          }
        },
        challenges: [{
          title: '🔐 ASCII Converter', scene: 'A=65, a=97. Difference is always 32.',
          q: 'Read a lowercase letter and convert to uppercase using ASCII arithmetic.',
          hints: ['Read a character variable.', 'Subtract 32 from it.', 'upper <- letter - 32'],
          sol: `Algorithm To_Upper;\nVar letter, upper : character;\nBegin\n  Read(letter);\n  upper <- letter - 32;\n  Write("Uppercase: ", upper);\nEnd;`
        }]
      },

      {
        id: 'cond', icon: '🔀', name: 'Conditions', sub: 'If, Else, Switch',
        concept: {
          title: 'Why do we need conditions?',
          real: 'YouTube checks: "logged in?" Yes→feed. No→login. Every app makes thousands of decisions per second.',
          body: `<p>Conditions create <strong>branching</strong>.</p>
<p><strong>If-Else</strong>: boolean check. <strong>Switch</strong>: one variable, many values.</p>
<p>Logical: <code>AND</code>, <code>OR</code>, <code>NOT</code>. Relational: <code>=</code>, <code>!=</code>, <code>&lt;</code>, <code>&gt;</code>, <code>&lt;=</code>, <code>&gt;=</code>.</p>`,
          diagram: `           ┌─────────────┐
           │ age >= 18 ? │
           └──────┬──────┘
            yes ╱    ╲ no
     ┌─────────┐      ┌──────────┐
     │ "Vote!" │      │ "Wait."  │
     └─────────┘      └──────────┘`,
          code: `Algorithm Check_Grade;\nVar grade : float;\nBegin\n  Read(grade);\n  If (grade >= 10) Then\n    Write("Passed");\n  Else\n    If (grade >= 8) Then\n      Write("Retake exam");\n    Else\n      Write("Failed");\n    EndIf;\n  EndIf;\nEnd;`,
          insight: 'If-Else lets code take different paths — this is what makes programs intelligent.'
        },
        exercises: {

<p>No base case → infinite loop → stack overflow!</p>
<p>Serie 1 Ex.1 asks for ALL of: Factorial, Power, Sum(1..n), GCD, Fibonacci.</p>
<p>For EACH one: both <strong>recursive</strong> and <strong>iterative</strong> versions are required.</p>`,
          diagram: `Call Stack for Factorial(4):

  CALL ──→  Factorial(4)  → needs Factorial(3)
  CALL ──→  Factorial(3)  → needs Factorial(2)
  CALL ──→  Factorial(2)  → needs Factorial(1)
  CALL ──→  Factorial(1)  → needs Factorial(0)
  BASE ──→  Factorial(0)  → returns 1  ✓
  RETURN ←  Factorial(1)  → 1×1 = 1
  RETURN ←  Factorial(2)  → 2×1 = 2

          code: `// ALL 5 FORMULAS from Serie 1 Ex.1 (recursive):
// 1. Factorial: n! = n × (n-1)!,  base: 0! = 1
integer function Fact(n:integer)
Begin
  If n = 0 Then Return 1;
  Else Return n * Fact(n-1);
  EndIf;
End;

// 2. Power: b^p = b × b^(p-1),  base: b^0 = 1
integer function Power(b:integer, p:integer)
Begin
  If p = 0 Then Return 1;
  Else Return b * Power(b, p-1);
  EndIf;
End;

// 3. Sum(1..n) = n + Sum(1..n-1),  base: Sum(0) = 0
integer function Sum(n:integer)
Begin
  If n = 0 Then Return 0;
  Else Return n + Sum(n-1);
  EndIf;
End;

// 4. GCD(a,b) = GCD(b, a mod b),  base: GCD(a,0) = a
integer function GCD(a:integer, b:integer)
Begin
  If b = 0 Then Return a;
  Else Return GCD(b, a mod b);
  EndIf;
End;

// 5. Fibonacci: F(n)=F(n-1)+F(n-2), base: F(0)=0, F(1)=1
integer function Fib(n:integer)
Begin
  If n = 0 Then Return 0;
  ElseIf n = 1 Then Return 1;
  Else Return Fib(n-1) + Fib(n-2);
  EndIf;
End;`,

<p>String ops: length, reverse, compare, copy — all character by character.</p>

    function topicPct(id) {
      const s = (loadAll())[id];
      if (!s) return 0;
      const a = (s.tr || []).filter(x => x.c).length + (s.bl || []).filter(x => x.c).length;
      const b = (s.ta || []).filter(x => x && x.trim().length > 10).length;
      const c = (s.ck || []).filter(x => x).length;
      const t = (s.tr || []).length + (s.bl || []).length + (s.ta || []).length + (s.ck || []).length;
      return t > 0 ? Math.round((a + b + c) / t * 100) : 0;

    function esc(s) { return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }
    function norm(s) { return s.replace(/\s+/g, ' ').trim().toLowerCase().replace(/←/g, '<-'); }

    function autoCheck(ta) {
      const rawCode = ta.value, card = ta.closest('.card');
      if (!card) return;
      const cks = card.querySelectorAll('.ck');
      if (!cks.length || rawCode.length < 15) return;
      // Strip comments before matching to avoid false positives
      const code = rawCode.split('\n').map(l => l.replace(/\/\/.*$/g, '')).join('\n');
      const warns = [];
      const hasArrow = /(<-|←)/.test(code);
      const usesEq = /[^!<>=]=[^=]/.test(code.replace(/<-/g, 'XX').replace(/←/g, 'XX').replace(/>=/g, 'XX').replace(/<=/g, 'XX').replace(/!=/g, 'XX'));
      if (usesEq && !hasArrow) warns.push('⚠️ Use "<-" for assignment, not "=". USTHB rule!');
      // Auto-tick checklist (yellow = detected, not verified)
      if (T[cur] && T[cur].exercises.t3 && T[cur].exercises.t3.checks) {
        T[cur].exercises.t3.checks.forEach((txt, i) => {
          if (i >= cks.length) return;
          if (cks[i].classList.contains('on') && !cks[i].classList.contains('auto')) return; // manual override
          let m = false; const cl = txt.toLowerCase();
          // Stricter patterns: require actual code structure, not just keyword
          if (cl.includes('<-') && hasArrow) m = true;
          if (cl.includes('struct') && /struct\s+\w+\s*\{/i.test(code)) m = true;
          if (cl.includes('return') && /Return\s+\w/i.test(code)) m = true;
          if (cl.includes('for') && /For\s+\w+\s*<-/i.test(code)) m = true;
          if (cl.includes('while') && /While\s*\(.+\)\s*Do/i.test(code)) m = true;
          if (cl.includes('free') && /free\s*\(\s*\w/i.test(code)) m = true;
          if (cl.includes('malloc') && /malloc\s*\(/i.test(code)) m = true;
          if (cl.includes('null') && /NULL/i.test(code)) m = true;
          if (cl.includes('swap') && /temp\s*<-/i.test(code)) m = true;
          if (cl.includes('pointer') && /\*\w+\s*<-/i.test(code)) m = true;
          if (cl.includes('dereference') && /\*\w+\s*<-/i.test(code)) m = true;
          if (m) { cks[i].classList.add('on', 'auto'); cks[i].textContent = '~'; }
          else if (cks[i].classList.contains('auto')) { cks[i].classList.remove('on', 'auto'); cks[i].textContent = ''; }
        });
      }
      let w = card.querySelector('.syntax-warn');
      if (!w) { w = document.createElement('div'); w.className = 'syntax-warn'; ta.parentNode.insertBefore(w, ta.nextSibling); }
      if (warns.length) { w.innerHTML = warns.join('<br>'); w.classList.add('show'); } else { w.classList.remove('show'); }
    }

      return `<div class="card"><span class="tier-badge t1">TIER 1 — TRACE</span>
    <div class="card-title">${t.title}</div><div class="desc">${t.desc}</div>
    <div class="code">${esc(t.code)}</div>
    <table class="trace-tbl"><thead><tr><th>Step</th><th>Answer</th><th>Feedback</th></tr></thead>
    <tbody>${rows}</tbody></table></div>`;
    }
    function chkTr(i) {
      const t = T[cur].exercises.t1, inp = document.getElementById('tr' + i), fb = document.getElementById('trf' + i);
      const v = inp.value.trim(), k = 'tr' + i;
      if (!v) { inp.className = 'trace-in'; fb.innerHTML = ''; return; }
      if (norm(v) === norm(t.steps[i].ans)) {
        inp.className = 'trace-in ok';
        fb.innerHTML = '<span style="color:var(--green)">✓ Correct</span>';
        updProg(); saveProgress();
      } else {
        inp.className = 'trace-in err';
        wrongCounts[k] = (wrongCounts[k] || 0) + 1;
        if (wrongCounts[k] >= 2) fb.innerHTML = `<span style="color:var(--red)">✗ Answer: <code>${t.steps[i].ans}</code></span>`;
        else fb.innerHTML = `<span style="color:var(--red)">✗ Try again </span><button class="btn-sol" style="display:inline-block" onclick="this.parentElement.innerHTML='<span style=\\'color:var(--accent)\\'>Answer: ${t.steps[i].ans}</span>'">Show solution</button>`;
      }
    }
    function mkT2(t) {
      const bl = t.blanks.map((b, i) => `<div style="margin:10px 0">
    <div style="font-size:12px;color:var(--text2);margin-bottom:4px">${i + 1}. ${b.ph}</div>
    <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
      <input class="blank-in" id="bl${i}" placeholder="..." oninput="chkBl(${i})" onchange="saveProgress()">
      <span id="blf${i}" style="font-size:12px"></span>
    </div></div>`).join('');
      return `<div class="card"><span class="tier-badge t2">TIER 2 — FILL</span>
    <div class="card-title">${t.title}</div><div class="desc">${t.desc}</div>
    <div class="code">${esc(t.code)}</div>
    <div style="margin-top:12px">${bl}</div></div>`;
    }
    function chkBl(i) {
      const t = T[cur].exercises.t2, inp = document.getElementById('bl' + i), fb = document.getElementById('blf' + i);
      const v = inp.value.trim(), k = 'bl' + i;
      if (!v) { inp.className = 'blank-in'; fb.innerHTML = ''; return; }
      if (norm(v) === norm(t.blanks[i].ans)) {
        inp.className = 'blank-in ok';
        fb.innerHTML = `<span style="color:var(--green)">✓ ${t.blanks[i].hint}</span>`;
        updProg(); saveProgress();
      } else {
        inp.className = 'blank-in err';
        wrongCounts[k] = (wrongCounts[k] || 0) + 1;
        if (wrongCounts[k] >= 2) fb.innerHTML = `<span style="color:var(--red)">Answer: <code>${esc(t.blanks[i].ans)}</code> — ${t.blanks[i].hint}</span>`;
        else fb.innerHTML = `<span style="color:var(--red)">✗ Hint: ${t.blanks[i].hint} </span><button class="btn-sol" style="display:inline-block" onclick="this.parentElement.innerHTML='<span style=\\'color:var(--accent)\\'>Answer: ${esc(t.blanks[i].ans)}</span>'">Show solution</button>`;
      }
    }
    function mkT3(t) {
      const cks = t.checks.map((c, i) => `<li><div class="ck" id="ck${i}" onclick="togCk(${i})"></div><span>${c}</span></li>`).join('');
      return `<div class="card"><span class="tier-badge t3">TIER 3 — BUILD</span>
    <div class="card-title">${t.title}</div>
    <div class="real-world">🎯 <strong>Scenario:</strong> ${t.scenario}</div>
    <div class="desc" style="margin-top:8px">${t.desc}</div>
    <textarea class="answer" placeholder="Write your algorithm here..." oninput="onT3(this)" onblur="saveProgress()"></textarea>
    <div class="btn-row">
      <button class="btn btn-p" onclick="showRef()">Show Reference Solution</button>
      <button class="btn-dl" onclick="dlCode(this)">📥 Download My Code</button>
    </div>
    <div class="reveal" id="refSol">
      <div style="font-size:14px;font-weight:700;margin-bottom:10px;color:var(--accent)">Compare:</div>
      <div class="side">
        <div><div style="font-size:11px;color:var(--text2);margin-bottom:4px;font-weight:600">YOUR ANSWER</div>
          <div class="code" id="stuSol" style="min-height:60px;white-space:pre-wrap"></div></div>
        <div><div style="font-size:11px;color:var(--green);margin-bottom:4px;font-weight:600">REFERENCE</div>
          <div class="code">${esc(t.ref)}</div></div>
      </div>
      <div style="margin-top:14px;font-weight:700;font-size:14px">Checklist (auto-checked ✓):</div>
      <ul class="ck-list">${cks}</ul>
    </div></div>`;
    }
    function onT3(ta) { autoCheck(ta); updProg(); }
    function showRef() {
      const b = document.getElementById('refSol'); b.classList.add('show');
      const ta = b.closest('.card').querySelector('textarea');
      document.getElementById('stuSol').textContent = ta ? ta.value || '(empty)' : '';
      saveProgress();
    }
    function togCk(i) {
      const e = document.getElementById('ck' + i);
      e.classList.toggle('on'); e.classList.remove('auto');
      e.textContent = e.classList.contains('on') ? '✓' : '';
      updProg(); saveProgress();
    }
    function buildChallenges(t) {
      if (!t.challenges || !t.challenges.length) return '<div class="section-head"><span class="section-num">3</span> Challenges</div><div class="card"><p>Coming soon.</p></div>';
      return `<div class="section-head"><span class="section-num">3</span> Challenge Problems</div>
    ${t.challenges.map((c, i) => mkCh(c, i)).join('')}`;
    }
    function mkCh(c, ci) {
      const h = c.hints.map((h, hi) => `<button class="hint-btn" onclick="document.getElementById('h${ci}_${hi}').classList.add('show')">Hint ${hi + 1}</button>
    <div class="hint-box" id="h${ci}_${hi}">💡 ${h}</div>`).join('');
      return `<div class="ch-card"><div class="ch-title">${c.title}</div>
    <div class="ch-scene">${c.scene}</div>
    <div style="font-size:15px;font-weight:600;margin-bottom:12px">❓ ${c.q}</div>
    <div style="margin-bottom:8px">${h}</div>
    <textarea class="answer" placeholder="Think, then write..." oninput="updProg()" onblur="saveProgress()"></textarea>
    <div class="btn-row">
      <button class="btn btn-g" onclick="document.getElementById('cs${ci}').classList.add('show');saveProgress()">Show Solution</button>
      <button class="btn-dl" onclick="dlCode(this)">📥 Download</button>
    </div>
    <div class="reveal" id="cs${ci}">
      <div style="font-size:14px;font-weight:700;margin-bottom:8px;color:var(--purple)">Solution:</div>
      <div class="code">${esc(c.sol)}</div>
    </div></div>`;
    }

    function updProg() {
      const ok = document.querySelectorAll('.trace-in.ok,.blank-in.ok').length;
      const f = [...document.querySelectorAll('textarea.answer')].filter(t => t.value.trim().length > 10).length;
      const c = document.querySelectorAll('.ck.on').length;
      const total = document.querySelectorAll('.trace-in').length + document.querySelectorAll('.blank-in').length + document.querySelectorAll('textarea.answer').length + document.querySelectorAll('.ck').length;
      const pct = total > 0 ? Math.min(100, Math.round((ok + f + c) / total * 100)) : 0;
      document.getElementById('progress-bar').style.width = pct + '%';
      document.getElementById('progress-pct').textContent = pct + '%';
    }
    window.addEventListener('beforeunload', () => saveProgress());
    buildGrid();
  </script>
</body>

</html>
