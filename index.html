<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AlgoTutor — USTHB L1</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div id="app">
        <header>
            <div class="logo">Algo<span>Tutor</span></div>
            <button class="back-btn" id="backBtn" onclick="goHome()">← Topics</button>
            <button class="hdr-btn" onclick="exportProgress()" title="Save your progress to a file">💾 Export</button>
            <button class="hdr-btn" onclick="importProgress()" title="Restore progress from a file">📂 Import</button>
            <input type="file" id="importFile" accept=".json" style="display:none" onchange="doImport(event)">
            <div id="progress-wrap">
                <div id="progress-bar"></div>
            </div>
            <div id="progress-pct">0%</div>
        </header>
        <main>
            <div id="start-screen">
                <h1>📘 AlgoTutor — USTHB L1</h1>
                <p>Interactive study tool for the Algorithms & Data Structures II course (Serie 1 & Serie 2). Pick a
                    topic,
                    learn the concept, then test yourself. Progress is saved automatically.</p>
                <div class="topic-grid" id="topicGrid"></div>
            </div>
            <div id="tutor-area">
                <div class="pills" id="pills"></div>
                <div id="sec0"></div>
                <div id="sec1" style="display:none"></div>
                <div id="sec2" style="display:none"></div>
            </div>
        </main>
    </div>

    <script src="js/data/topics.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/checker.js"></script>
    <script src="js/renderer.js"></script>
    <script src="js/app.js"></script>
</body>

</html>
